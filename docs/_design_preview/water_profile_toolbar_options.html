<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>节点数据表工具栏排版预览</title>
  <style>
    :root {
      --bg: #f4f6fb;
      --card: #ffffff;
      --text: #1f2430;
      --muted: #6a7485;
      --bd: #d8deea;
      --primary: #0aa3b5;
      --primary-dark: #0892a3;
      --btn-bg: #ffffff;
      --btn-text: #1f2430;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background:
        radial-gradient(circle at 0% 0%, #eef5ff 0%, transparent 35%),
        radial-gradient(circle at 100% 100%, #ecfbf9 0%, transparent 35%),
        var(--bg);
      color: var(--text);
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      line-height: 1.5;
      padding: 24px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 26px;
      letter-spacing: .5px;
    }
    .sub {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 14px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 16px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--bd);
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 8px 24px rgba(31, 36, 48, .06);
    }
    .title {
      margin: 0 0 8px;
      font-size: 16px;
      font-weight: 700;
    }
    .desc {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 13px;
    }
    .toolbar {
      border: 1px solid var(--bd);
      border-radius: 10px;
      background: #fafcff;
      padding: 10px;
    }
    .row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 8px;
    }
    .row:last-child { margin-bottom: 0; }
    .label {
      font-size: 16px;
      font-weight: 700;
      margin-right: auto;
      white-space: nowrap;
    }
    .btn {
      border: 1px solid #cfd8e8;
      border-radius: 8px;
      background: var(--btn-bg);
      color: var(--btn-text);
      padding: 0 14px;
      height: 36px;
      font-size: 14px;
      white-space: nowrap;
      cursor: default;
    }
    .btn.primary {
      border-color: transparent;
      background: linear-gradient(180deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: #fff;
      font-weight: 600;
    }
    .btn.disabled {
      background: #cfd3da;
      color: #f5f6f8;
      border-color: #cfd3da;
    }

    .compact .row { gap: 6px; }
    .compact .btn { height: 34px; padding: 0 12px; font-size: 13px; }

    .balanced .row { gap: 10px; }
    .balanced .btn { height: 38px; padding: 0 16px; font-size: 14px; }

    .comfortable .row { gap: 12px; }
    .comfortable .btn { height: 40px; padding: 0 18px; font-size: 15px; }
  </style>
</head>
<body>
  <h1>节点数据表工具栏排版预览</h1>
  <p class="sub">推荐先看“平衡（推荐）”。当前代码默认已切换为该方案。</p>

  <div class="grid">
    <section class="card compact">
      <h2 class="title">方案 A: 紧凑（compact）</h2>
      <p class="desc">单行高密度排布，节省高度，适合中小窗口。</p>
      <div class="toolbar">
        <div class="row">
          <span class="label">节点数据表</span>
          <button class="btn primary">从批量计算导入</button>
          <button class="btn primary">插入渐变段</button>
          <button class="btn primary">倒虹吸水力计算</button>
          <button class="btn primary disabled">有压管道水力计算</button>
          <button class="btn primary">执行计算</button>
          <button class="btn">导入Excel</button>
          <button class="btn">添加节点</button>
          <button class="btn">插入节点</button>
          <button class="btn">删除节点</button>
          <button class="btn">复制节点</button>
          <button class="btn">清空</button>
        </div>
      </div>
    </section>

    <section class="card balanced">
      <h2 class="title">方案 B: 平衡（balanced，推荐）</h2>
      <p class="desc">单行里可读性与紧凑度平衡，推荐默认使用。</p>
      <div class="toolbar">
        <div class="row">
          <span class="label">节点数据表</span>
          <button class="btn primary">从批量计算导入</button>
          <button class="btn primary">插入渐变段</button>
          <button class="btn primary">倒虹吸水力计算</button>
          <button class="btn primary disabled">有压管道水力计算</button>
          <button class="btn primary">执行计算</button>
          <button class="btn">导入Excel</button>
          <button class="btn">添加节点</button>
          <button class="btn">插入节点</button>
          <button class="btn">删除节点</button>
          <button class="btn">复制节点</button>
          <button class="btn">清空</button>
        </div>
      </div>
    </section>

    <section class="card comfortable">
      <h2 class="title">方案 C: 宽松（comfortable）</h2>
      <p class="desc">单行更大间距和更高按钮，视觉更舒展，适合大屏。</p>
      <div class="toolbar">
        <div class="row">
          <span class="label">节点数据表</span>
          <button class="btn primary">从批量计算导入</button>
          <button class="btn primary">插入渐变段</button>
          <button class="btn primary">倒虹吸水力计算</button>
          <button class="btn primary disabled">有压管道水力计算</button>
          <button class="btn primary">执行计算</button>
          <button class="btn">导入Excel</button>
          <button class="btn">添加节点</button>
          <button class="btn">插入节点</button>
          <button class="btn">删除节点</button>
          <button class="btn">复制节点</button>
          <button class="btn">清空</button>
        </div>
      </div>
    </section>
  </div>
</body>
</html>
